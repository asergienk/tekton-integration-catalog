apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deloy-fbc
spec:
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      type: string
    - description: Name of the package from a FBC fragment to detemine a channel name (Optional)
      name: PACKAGE_NAME
      default: ""
      type: string
    - description: Name of the channel that is used to derive an unreleased bundle (Optional)
      name: CHANNEL_NAME
      default: ""
      type: string
  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
    - name: get-unreleased-bundle
      runAfter:
        - parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/asergienk/tekton-integration-catalog
          - name: revision
            value: CVP-4397
          - name: pathInRepo
            value: tasks/get-unreleased-bundle/0.1/get-unreleased-bundle.yaml
      params:
        - name: FBC_FRAGMENT
          value: "$(tasks.parse-metadata.results.component-container-image)"
        - name: PACKAGE_NAME
          value: $(params.PACKAGE_NAME)
        - name: CHANNEL_NAME
          value: $(params.CHANNEL_NAME)
    - name: provision-cluster-and-deploy-fbc
      runAfter:
        - get-unreleased-bundle
      when:
        - input: "$(tasks.get-unreleased-bundle.results.unreleased-bundle)"
          operator: notin
          values: [""]
      taskSpec:
        steps:
          - name: new-task
            image: quay.io/konflux-ci/konflux-test:v1.4.15@sha256:23a7e8c745a037da283f18f5e5108598efeaeb5263d599411b6c4a25c42c6f94
            script: |
              echo "This task ran because get-unreleased-bundle produced a result."
